<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Film</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎬 Daftar Film</h1>

<!-- Form tambah film -->
<form id="form-film">
    <h2>Tambah Film Baru</h2>
    <input type="text"   id="judul"     placeholder="Judul Film" required>
    <input type="text"   id="deskripsi" placeholder="Deskripsi" required>
    <input type="text"   id="kategori"  placeholder="Kategori (misal: Sci-Fi, Drama)" required>
    <input type="url"    id="gambar"    placeholder="URL Gambar (opsional)">

    <!-- Challenge 1: Field baru -->
    <input type="text"   id="sutradara" placeholder="Sutradara" required>
    <input type="number" id="tahun"     placeholder="Tahun Terbit" min="1900" max="2099" required>
    <input type="number" id="rating"    placeholder="Rating (1–10)" min="1" max="10" step="0.1" required>

    <button type="submit">+ Tambah Film</button>
</form>

<!-- Challenge 2: Filter pencarian -->
<div class="search-wrap">
    <input type="text" id="cari-film" placeholder="🔍 Cari film berdasarkan judul...">
</div>

<div id="daftar-film"></div>

<script src="script.js"></script>

</body>
</html>
